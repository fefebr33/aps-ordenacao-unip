        <style type="text/css" id="generated-style"><![CDATA[#screen {
                font-family: 'DejaVu Sans Mono', monospace;
                font-style: normal;
                font-size: 14px;
            }

        text {
            dominant-baseline: text-before-edge;
            white-space: pre;
        }
    
            :root {
                --animation-duration: 1038ms;
            }

            @keyframes roll {
                0.000%{transform:translateY(0px)}
0.096%{transform:translateY(-442px)}
0.963%{transform:translateY(-884px)}
1.541%{transform:translateY(-1326px)}
3.661%{transform:translateY(-1768px)}
100.000%{transform:translateY(-1768px)}
            }

            #screen_view {
                animation-duration: 1038ms;
                animation-iteration-count:infinite;
                animation-name:roll;
                animation-timing-function: steps(1,end);
                animation-fill-mode: forwards;
            }
        ]]></style>
