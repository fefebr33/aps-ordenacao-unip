    <svg id="screen" width="640" height="408" viewBox="0 0 640 408" preserveAspectRatio="xMidYMin slice">
    <rect class="background" height="100%" width="100%" x="0" y="0"/><defs><g id="g1"><text x="0" textLength="480" class="foreground">============================================================</text></g><g id="g2"><text x="0" textLength="456" class="foreground">  APS - AN&#193;LISE DE PERFORMANCE DE ALGORITMOS DE ORDENA&#199;&#195;O</text></g><g id="g3"><text x="0" textLength="240" class="foreground">  Universidade Paulista - UNIP</text></g><g id="g4"><text x="0" textLength="280" class="foreground">  Aluno: Felipe Rueda - RA: G802JE3</text></g><g id="g5"><text x="0" textLength="8" class="background"> </text></g><g id="g6"><text x="0" textLength="328" class="foreground">[1] Compilando o c&#243;digo-fonte (main.c)...</text></g><g id="g7"><text x="0" textLength="296" class="foreground">    $ gcc main.c -o aps_ordenacao -lm</text></g><g id="g8"><text x="0" textLength="312" class="foreground">    &#10003; Compila&#231;&#227;o conclu&#237;da com sucesso!</text></g><g id="g9"><text x="0" textLength="432" class="foreground">[2] Executando o programa de an&#225;lise de performance...</text></g><g id="g10"><text x="0" textLength="368" class="foreground">    Algoritmos: QuickSort, HeapSort, MergeSort</text></g><g id="g11"><text x="0" textLength="584" class="foreground">    Vetores: 10, 20, 50, 100, 200, 500, 1000, 2000, 5000, 10000 elementos</text></g><g id="g12"><text x="0" textLength="512" class="foreground">    Cada teste executa 5 ordena&#231;&#245;es e calcula a m&#233;dia de passos.</text></g><g id="g13"><text x="0" textLength="480" class="foreground">------------------------------------------------------------</text></g><g id="g14"><text x="0" textLength="264" class="foreground">Teste com vetores de 10 elementos</text></g><g id="g15"><text x="0" textLength="424" class="foreground">Media de Passos para Ordenar o Vetor no QuickSort: 87</text></g><g id="g16"><text x="0" textLength="424" class="foreground">Media de Passos para Ordenar o Vetor no HeapSort: 189</text></g><g id="g17"><text x="0" textLength="440" class="foreground">Media de Passos para Ordenar o Vetor no Merge Sort: 191</text></g><g id="g18"><text x="0" textLength="440" class="foreground">=======================================================</text></g><g id="g19"><text x="0" textLength="264" class="foreground">Teste com vetores de 20 elementos</text></g><g id="g20"><text x="0" textLength="432" class="foreground">Media de Passos para Ordenar o Vetor no QuickSort: 207</text></g><g id="g21"><text x="0" textLength="424" class="foreground">Media de Passos para Ordenar o Vetor no HeapSort: 484</text></g><g id="g22"><text x="0" textLength="440" class="foreground">Media de Passos para Ordenar o Vetor no Merge Sort: 467</text></g><g id="g23"><text x="0" textLength="264" class="foreground">Teste com vetores de 50 elementos</text></g><g id="g24"><text x="0" textLength="432" class="foreground">Media de Passos para Ordenar o Vetor no QuickSort: 615</text></g><g id="g25"><text x="0" textLength="432" class="foreground">Media de Passos para Ordenar o Vetor no HeapSort: 1563</text></g><g id="g26"><text x="0" textLength="448" class="foreground">Media de Passos para Ordenar o Vetor no Merge Sort: 1439</text></g><g id="g27"><text x="0" textLength="272" class="foreground">Teste com vetores de 100 elementos</text></g><g id="g28"><text x="0" textLength="440" class="foreground">Media de Passos para Ordenar o Vetor no QuickSort: 1445</text></g><g id="g29"><text x="0" textLength="432" class="foreground">Media de Passos para Ordenar o Vetor no HeapSort: 3652</text></g><g id="g30"><text x="0" textLength="448" class="foreground">Media de Passos para Ordenar o Vetor no Merge Sort: 3283</text></g><g id="g31"><text x="0" textLength="272" class="foreground">Teste com vetores de 200 elementos</text></g><g id="g32"><text x="0" textLength="440" class="foreground">Media de Passos para Ordenar o Vetor no QuickSort: 3382</text></g><g id="g33"><text x="0" textLength="432" class="foreground">Media de Passos 